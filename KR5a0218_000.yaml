body:
  text: 舉步虛焚符於水盂淨穢太虛無體淨穢皆空妄覺一生塵緣競起既非真境即是魔宫是故行持先當蕩滌謹奉真符告召九鳯破穢大將軍八方大力威神乾羅怛那洞罡太玄使者五方五龍神君華池文浴夫人滄水繡衣使者吞魔食鬼將軍銅頭鐵面騎吏本佩法籙仙靈解穢合干將吏並請遵依元降齊赴靈場布氣行神流鈴擲火變化法水蕩穢氣於八紘斬馘魔精布真風於十極萬靈振伏十方肅清天無氛穢地無妖塵冥慧洞清大量玄玄一如告命淨天地神呪次舉華夏師三禮上香道由心學信假香傳手執玉爐心存九天真靈下盻仙斾臨軒臣今所啓咸賜如言跪默啓具位臣某恭焚真香誠惶誠恐稽首頓首啓奏供養玉清聖境元始天尊上清真境靈寶天尊太清仙境道德天尊昊天至尊玉皇上帝星主北極紫微大帝太微天皇大帝承天效法后土皇地祇神霄真王長生大帝東極青華大帝九天應元雷聲溥化天尊九天雷祖大帝上清紫微碧玉宫太乙大天帝六天洞淵大帝六波天主帝君可韓司丈人真君九天採訪使真君五方五老天尊十方靈寶天尊三十二天帝君諸天上帝髙真十極十華真宰瓊章道藏經籙神仙斗父北極龍漢天君斗母紫光金真聖德天后中天北斗九皇道君斗中帝座星君北斗九皇夫人內妃擎羊陀羅二仙使者斗中神仙靈官將吏天罡大聖萬真節度星君日宫月府星君五方五德星君玄都四曜星君南斗六司星君東西中三斗星君三台華蓋星君二十八宿星君十二宫分星君普天玄象星宰南極長生注生大帝南極福祿壽星君西臺金真萬氣元君本命元辰福祿壽星君大小運限祿馬星君當生流年照臨星宰三元三官大帝北極天蓬蒼天上帝北極天猷丹天上帝北極翊聖皓天上帝北極佑聖玄天上帝天曹太皇萬福真君天曹玉曆上生真君天曹掠剩大夫真君天曹注福注祿注壽真君天曹㑹上無邊真宰九天生神大帝九天儲福定命真君九天司命上卿真君九天監生大神九天衛房聖母元君九天朝元諸司真宰星河橋塔生化神祇五雷院使真君雷霆都司元命真君北極驅邪使泰玄都三省真君僉書三省使真君靈寶五師真君火府傳教紫府馮真人祖師希夷陳真人祖師通玄劉真人祖師中天樞相伏魔許真人祖師清隱上仙披雲楊真人祖師雲莊黃真人宗師西臺風雨令玉田葉真人火府演派流芳歷代師真火府主法都雷總管李元君主帥顯順大將軍丘元帥副帥靈變大將軍王元帥雷樞大神陳元帥雷機大神李元帥雷衛大神孔元帥雷烈大神崔元帥雷光大神周元帥雷令大神紀元帥雷陳大神劉元帥雷威大神林元帥驅督家書白元帥通奏直符謝元帥開壇聽令四大雷神諸階法中官將吏兵水府土司無邊真宰陽間嶽瀆祀典神祇名山洞府得道神仙雷府殟司列職真宰行年太歲至德尊神內廷五祀之神京都城隍之神京畿廟貌祀典神祇壇靖所奉香火明神日分功曹使者虛空來往神仙所啓無邊真宰干冒真慈洞回昭格伏念臣猥以公微冒參玄祕無功及物有過在躬第惟有受於投詞詎敢或忘於請命以今奉為某恪遵科教肅建星壇像斗然燈投符作占伏願天之髙星辰之逺一忱可格於齊臨地之大河海之深跬步敢期於畢至珠懸黍米法演騫林駐驆停驂環衮龍而當座鳴珂委珮翼序鷺以聮班少聽洞章同躋妙道臣干冒威嚴下情無任激切屏營之至稽首蝢首再拜謹言舉消災解厄天尊召將焚降令符召社令六神天靈天靈三界威神木客邪鬼令化微塵風雷雨部四瀆神王五嶽真君各拱壇界分别章表上達玉清急急如大赤天帝律令敕召四將上清有敕速召雷神直壇四將火急摧傾五嶽四瀆各聽威聲關召速降各列宫庭奉符用命面奏玉清急急如大赤天帝敕天丁天丁地靈地靈隂陽交合雷部現形謹召開壇聽令髙陶崔趙四大天將速至壇所疾存至四角舉靈通感應天尊召謝白焚符杳杳冥冥天地同生神化倐忽聚而成形聞呼即至遇召速臨急急如大赤天帝敕吾今通奏壇前聽候所啓所願通達御前當日直符謝祐白伸隨師勑令急急如大赤天帝敕子文午出舉靈通感應天尊唵兜吽吽梵應雷轟攝唵杏鳩盤陀利攝天下鬼神依師勑令速如火令急奉大赤天帝君敕午文存至適伸告召巳沐來臨以今奉為某伏請整肅威嚴護䘙壇墠開天門閉地户聿嚴虎豹之關朝帝所躡雲根共迓龍鸞之馭益昭神貺潜格靈庥舉金真演教天尊降師學而不從師玄理難於自悟教者必以正至道妙於心傳脉絡貫通宗支接續此太上聿嚴於授度故後人深重於繼承凡有皈投敢忘關告門下具職謹同齊官默想師闈志心拜請祖師啓教紫府馮真人祖師純素妙道希夷陳真人祖師太極上相通玄劉真人祖師中天樞相伏魔許真人祖師清隱上仙披雲楊真人祖師浦城真常先生雲莊黃真人宗師西臺風雨令玉田葉真人火府歷代演派師真恭望師慈俯垂省録宓聞清明在躬符章瑞世夢傳聖母靈書丕顯於開元感叶醮筵異相遂彰於太一石室之文斯隱蜀都之派維新老君現而來山下之青牛魔女擒而掣井中之鐵鎖文星炳瑞樞府儲祥白晝而流火漲天沖虛示化清夜而彩雲貫斗躡景飛神嗣之浦城者皆可筌蹄繼之玉田者足為矜式嘯命而風翻雷激指揮而雨止風停著八字之家書永錫生生世世冠諸階之道法茂延子子孫孫是夕恭願玉珮鏗鏘霞𥚑縹眇自天衢而下邁格塵世之小心謹啓以聞舉道經師寶天尊上信香見師雲輿散花獻茶具位某虔誠上啓祖師啓教紫府馮真人祖師希夷陳真人祖師通玄劉真人祖師伏魔許真人火府古今歷代傳道授法演派師真恭望師慈俯垂省録伏聞師所存道所存派系逺通於脉絡德之至教之至範模永賴於甄陶以今奉為某丐投告盟斗極順度星𨇠重念某玄門末緒道域踈才姓名冒綴於仙階多違戒律科格罔明於祖訓濫竊行持匪藉提撕曷由感格所祈事理乞賜允俞仰冀宣行斗敕播告星垣俾所屬之玄曹聲發響應命合干之將帥形動影隨罡步通靈符章有驗干冒師嚴某下情無任虔禱之至謹言舉七元覆護天尊明燈蓋聞斗運七元宰生殺照臨之柄燈分五色驗吉凶禍福之機光燭人間位居天上仗丹符而飛焰燦然象緯之當空炳璿極以同輝儼若璣衡之在御仰希昭報式副虔祈法師然燈衆諷神呪師存思合斗太上有敕㸃發斗燈七元來降救度衆生左輔右弼顯現威靈天蓬元帥統領天兵五雷使者六甲六丁真武大聖台中三星去病除禍斬馘妖精違敕者死順敕者生斗燈一照身宅光明福果長壽永保利貞燈光朗耀照人長生三魂安健七魄康寧明燈攝光遊精不飛七魄安守萬神總歸斗中齊景長處光輝七元來降受神告聞燈光明暗知吉知凶威神之力萬願皆從投盆符作占臣聞清清泠泠者神水之鄉心心授授者真符之祕必也驗靜中之動于以測玄上之機伏願光溢恩波春融福筆壽無極無窮之脉譬彼長流定所戴所履之方昭哉吉報所有牒文兹當宣示宣牒投盆符召二使者太乙火府焚符告召斗中擎羊陀羅二仙使者斗中通事舍人聞今告召速降壇庭急急奉大赤天帝君敕斗中有將職贊璿璣掌善罰惡察過言非玉衡布令威鎮瑤池聞吾呼召風火奔馳赴臨壇下母輒稽違急準大赤天帝敕三敕靈吒唎星帝摩娑訶多薩訶哩啼聚莎訶唵𠲰吒唎攝天中斗神斗曜之靈左有汝明右有妙真神變莫測出幽入冥吾今關召速降壇庭急準大赤天帝敕存降法師白事焚合符適伸告召諒沐降臨當府以今奉為某舒壇建斗解厄消災欲迓宸庥以伸寅奉敢煩神力賫此合符上詣斗宮請降恩光俯臨燈席準敕奉行拱俟昭報步斗存遣靈通感應天尊具位臣某與齊官合壇官衆等謹同誠上啓三清上聖十極髙真北斗九皇道君四府萬靈衆聖火府師君將帥燈筵觀鑑神祇干冒真慈洞回昭鑒臣聞燒香歸虛無華蓋巳騰於寶篆冥心望北極丹霄傒駕於金輿載維梵氣之玄𡪹尚隔紅塵之穢濁仰瞻九陛俯罄一誠紫雲蓊勃於絳橋瑞霧紛馳於綵仗繡衣前導倐忽降下於瑶壇銀焰交輝恍若森羅於璇極臣與齊官遙望天階奉迎星馭焚接駕符降聖臣等中謝謹謹奏請中天大聖斗父北極龍漢天君中天大聖斗母紫光金真聖德天后北斗綱極宫太尉貪狼星皇君北斗靈關宫上帝巨門星皇君北斗紫極宫司空祿存星皇君北斗運天宫遊擊文曲星皇君北斗帝席宮斗君廉貞星皇君北斗上尊宫大帝武曲星皇君北斗關會宫上帝破軍星皇君洞陽宫大帝天尊外輔星皇君隱元宫大帝真人內弼星皇君中天大聖北斗九皇延生夫人臣等中謝恭望星慈特賜瑤光降臨蘭席雲輿適伸奏請巳沐降臨輒備淨茶用伸上獻進茶具位臣某等謹同誠上啓虛皇妙道十極髙真北極梵氣龍漢天君紫光金真勝德天后北斗九皇大道君斗宫列班真宰本命元辰星君火府師君雷神天帥燈壇所啓觀鑒神祇恭望聖慈洞垂昭鑒臣聞周沙界入微塵密運無方之化判人間司隂府實弘不測之功亘古亘今至靈至聖自天地肇分於太極而璇璣巳列於北辰蓮花九苞一時出現玉衡七政萬類生成故人品之貴賤雖殊在命分之照臨不異凡曰禍而曰福暨與災而與祥悉自權輿得由主宰然其大悲大願每赴感以垂慈資其厚德厚恩屢有求而叶應肅干喉舌敷露腹心劒符合而聖馭降臨燈焰輝而神光下燭靈斿畢集玄象森羅明水芳醪式陳初獻法事具位臣某等謹同誠上啓虛皇妙道十極髙真梵氣龍漢天君紫光金真聖德天后北斗九皇大道君斗宫無邊真宰本命元辰星君火府師君帥將三界一切威靈恭望聖慈洞回昭鑒臣聞應九天應九地尊無越於九皇曰北極曰北辰顯莫踰於北斗昭然在上劃爾當空故有耳目者靡不見聞而具性命者均從賦豫功參萬化道貫三才大如海嶽之靈祇舉拜涵濡之澤微若江河之魚鱔亦傾朝戴之心顧何災不滅何福不臻抑所感必通所求必應用敷悃素仰瀆髙明明水芳醪式陳亞獻法事具位臣某等謹同誠上啓虛皇妙道十極髙真梵氣龍漢天君紫光金真聖德天后北斗九皇大道君斗宫無邊真宰本命元辰星君火府師君雷神天帥三界官屬一切威靈恭望聖慈洞回昭鑒臣聞為樞機作主宰運六氣而御四時理綱紀統乾坤總五行而司八卦光臨下土位冠中天原夫太素之未分無形無象粵自混黃之成化有緯有經皇人按筆以書符太上開函而演奧座扶玉局教闡金科躡景履師綽著家書之妙旨飛神謁帝聿彰火府之靈文仰惟奕世以相傳爰許微臣而致懇念葵藿之誠可格愧潢汙之薦非儀明水芳醪式陳終獻法事進章或表臣聞道無心而可情求太上示延生之典天不言而能善應斗真垂度厄之科星馭俯臨霞𥚑並集禮既成於三獻誠敢怠於一心仰維上古之結繩不假文字繼自皇人之按筆以演洞章故封緘得以將懇謝之辭而毫楮遂式達敷陳之意宸聰伊邇聖鑒非遙九頓首以望天顔三薰手而披雲笈金輿玉輦昭回巳格於凡塵玉字金書報應即頒於溫詔臣謹關法壇神吏急急捧奏以聞爰有表文心章謹當跪奏宣關畢師步罡伏地待報得報即起上香解厄大聖北斗七元君能解三災厄大聖北斗七元君能解四煞厄大聖北斗七元君能解五行厄大聖北斗七元君能解六害厄大聖北斗七元君能解七傷厄大聖北斗七元君能解八難厄大聖北斗七元君能解九星厄大聖北斗七元君能解夫妻厄大聖北斗七元君能解男女厄大聖北斗七元君能解産生厄大聖北斗七元君能解復連厄大聖北斗七元君能解疫癘厄大聖北斗七元君能解疾病厄大聖北斗七元君能解精邪